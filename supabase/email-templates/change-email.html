<!doctype html>
<html>
  <head><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta http-equiv="Content-Type" content="text/html; charset=UTF-8"><style>@media (prefers-reduced-motion: no-preference){.card{animation:fadeUp 520ms ease-out both}.badge{animation:pulse 1800ms ease-in-out infinite}}@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}@keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(16,185,129,.32)}50%{transform:scale(1.04);box-shadow:0 0 0 10px rgba(16,185,129,0)}}</style></head>
  <body style="margin:0;background:#f8fafc;font-family:Arial,Helvetica,sans-serif;color:#0f172a;">
    <div style="padding:34px 18px;background:linear-gradient(135deg,#f8fafc 0%,#fff7ed 48%,#ecfdf5 100%);"><table role="presentation" width="100%" cellspacing="0" cellpadding="0"><tr><td align="center"><table class="card" role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#fff;border:1px solid #e2e8f0;border-radius:28px;overflow:hidden;box-shadow:0 28px 70px rgba(15,23,42,.14);"><tr><td style="padding:26px 28px;background:linear-gradient(135deg,#0f172a 0%,#1e293b 56%,#b45309 100%);"><div class="badge" style="display:inline-block;border-radius:999px;background:rgba(16,185,129,.16);border:1px solid rgba(167,243,208,.35);padding:8px 12px;color:#bbf7d0;font-size:12px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;">Account Security</div><h1 style="margin:18px 0 0;color:#fff;font-size:32px;line-height:1.15;font-weight:900;">Confirm your new email</h1><p style="margin:10px 0 0;color:#fde68a;font-size:15px;line-height:1.6;">Approve this email change for your SucessKart account.</p></td></tr><tr><td style="padding:30px 28px 10px;"><p style="margin:0;color:#475569;font-size:15px;line-height:1.7;">Click below to confirm this email address for your SucessKart account.</p></td></tr><tr><td align="center" style="padding:24px 28px 28px;"><a href="{{ .ConfirmationURL }}" style="display:inline-block;border-radius:16px;background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;text-decoration:none;font-size:15px;font-weight:800;padding:15px 26px;box-shadow:0 16px 34px rgba(245,158,11,.28);">Confirm Email Change</a></td></tr><tr><td style="padding:0 28px 30px;"><div style="border-radius:18px;background:#f8fafc;border:1px solid #e2e8f0;padding:15px 16px;color:#64748b;font-size:13px;line-height:1.6;">Backup link:<br><a href="{{ .ConfirmationURL }}" style="color:#b45309;word-break:break-all;">{{ .ConfirmationURL }}</a></div></td></tr><tr><td style="padding:18px 28px;background:#f1f5f9;border-top:1px solid #e2e8f0;color:#64748b;font-size:12px;line-height:1.5;">If you did not request this change, secure your account immediately.</td></tr></table></td></tr></table></div>
  </body>
</html>
