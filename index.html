<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/skillpro-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SkillPro - Premium online learning platform with 50+ courses, certifications, and mentorship" />
    <title>SkillPro - Professional Learning Platform</title>
  </head>
  <body class="bg-slate-50 text-slate-900">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <div id="zoomOverlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:99999;">
      <div style="position:absolute;top:20px;right:20px;background:#1f2937;padding:24px 28px;border-radius:16px;text-align:center;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,0.5);animation:fadeIn 0.3s;color:white;font-family:Arial,sans-serif;">
        <h2 style="margin:0 0 8px;font-size:18px;">Zoom Too High</h2>
        <p style="color:#9ca3af;margin:0 0 16px;font-size:13px;line-height:1.5;">Current zoom: <strong id="currentZoomDisplay" style="color:#fbbf24;">100%</strong>. For best experience, set zoom to <strong>85%</strong> or lower.</p>
        <button id="zoomOkBtn" style="background:#4ade80;color:#111827;border:none;padding:8px 32px;border-radius:8px;font-size:15px;font-weight:bold;cursor:pointer;">OK</button>
      </div>
    </div>

    <script>
      (function() {
        var style = document.createElement('style');
        style.textContent = '@keyframes fadeIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}';
        document.head.appendChild(style);

        function detectZoom() {
          var overlay = document.getElementById('zoomOverlay');
          var display = document.getElementById('currentZoomDisplay');
          if (!overlay) return;
          var zoom = Math.round((window.outerWidth / window.innerWidth) * 100);
          if (zoom < 10 || zoom > 500) zoom = 100;
          if (zoom > 88) {
            display.innerText = zoom + '%';
            overlay.style.display = 'block';
          } else {
            overlay.style.display = 'none';
          }
        }

        document.addEventListener('DOMContentLoaded', function() {
          document.getElementById('zoomOkBtn').addEventListener('click', function() {
            document.getElementById('zoomOverlay').style.display = 'none';
          });
          detectZoom();
        });

        window.addEventListener('resize', detectZoom);
      })();
    </script>
  </body>
</html>
